<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restock Focus Mode</title>

<style>
:root {
  --bg: #121212;
  --card: #1e1e1e;
  --accent: #00e676;
  --text: #ffffff;
  --secondary: #888;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  transition: background 0.6s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden; 
}

.main-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1600px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  gap: 40px;
}

.left-spacer {
  flex: 1;
  max-width: 440px;
  height: 600px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  gap: 20px;
}

#large-drink-view {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8));
  display: none;
}

.container {
  background: var(--card);
  padding: 2.5rem;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,.6);
  width: 100%;
  max-width: 420px;
  text-align: center;
  z-index: 10;
  flex-shrink: 0;
}

#side-panel {
  flex: 1;
  max-width: 440px;
  min-height: 550px;
  display: flex;
  flex-direction: column;
}

#task-display {
  min-height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.step-counter {
  color: var(--accent);
  font-size: .85rem;
  letter-spacing: 1.5px;
  margin-bottom: 0.5rem;
}

.task-image {
    max-width: 100%;
    border-radius: 12px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

.controls {
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

button {
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, filter 0.2s;
}

button:active { transform: scale(0.95); }

.done-btn {
  background: var(--accent);
  font-size: 20px;
  color: #000;
}

.done-btn.stage-start { background: #00e676; }
.done-btn.stage-continue { background: #ffd600; }
.done-btn.stage-end { background: #ff5252; color: #fff; }

.back-btn {
  background: #2a2a2a;
  color: var(--text);
  visibility: hidden;
  font-size: 20px;
}

#drinkButtons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap: 15px;
  visibility: hidden; 
}

#drinkButtons button {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 18px;
  background-color: #2a2a2a;
  color: white;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 12px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  font-size: 0.65rem;
  text-transform: uppercase;
  border: 2px solid rgba(255,255,255,0.05);
}

#drinkTool {
  display: none;
  padding: 25px;
  background: var(--card);
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  border: 1px solid #333;
}

.calc-display {
    background: #121212;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid #333;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.big-number {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
}

.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.num-btn {
    background: #2a2a2a;
    color: white;
    padding: 15px;
    font-size: 1.4rem;
    border-radius: 15px;
}

.enter-btn { background: var(--accent); color: #000; }
.clear-btn { background: #442222; }

@media (max-width: 1100px) {
  .main-wrapper {
    flex-direction: column;
    height: auto;
    padding: 40px 20px;
  }
  .left-spacer {
    height: auto;
    min-height: 300px;
    order: -1;
  }
  #side-panel {
    width: 100%;
    max-width: 420px;
    min-height: auto;
  }
  body { overflow-y: auto; }
}

.ice { background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/download-removebg-preview.png); }
.snapple { background-color: #4a148c !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/SNAPPLEZEROSUGARSNAPPLEPEACHTEA16FLOZ-01_2-removebg-preview.png)}
.snapple_juice { background-color: #c62828 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/large_2c5fdb68-0dce-4cbb-99d6-c43a350fc377-removebg-preview.png)}
.bloom { background-color: #2e7d32 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/971302448-C1N1-removebg-preview.png);}
.fiji { background-color: #0277bd !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/108200807-C1N1-removebg-preview.png);}
.core { background-color: #546e7a !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/core-hydration-water-16-9oz-bottle-rpet.webp);}
.essentia { background-color: #212121 !important; border: 1px solid #ff5252 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/large_6f015540-2c6e-44da-bd1c-08a27b9e6d6e-removebg-preview.png);}
.eternal { background-color: #1a237e !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/61sL-tXW4qL-removebg-preview.png);}
.evian { background-color: #f06292 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/108200129-C1N1-removebg-preview.png);}
.gatorade { background-color: #ef6c00 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/0430259-21-removebg-preview.png);}
.java_brew { background-color: #4e342e !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/71ytAu26PML-removebg-preview.png);}
.nesquik { background-color: #fbc02d !important; color: #000 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/unnamed.png); }
.nirvana { background-color: #00838f !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/10041028-removebg-preview.png);}
.saratoga { background-color: #004d40 !important; background-image: url(https://uploads.onecompiler.io/44h79x2wv/44h79hq67/large_90e44838-60c3-40b7-9480-62766cee76c5-removebg-preview.png); }
.ryl {background-color: #004d40;}
</style>
</head>

<body>

<div class="main-wrapper">
  <div class="left-spacer" id="left-display">
    <img id="large-drink-view" src="" alt="Selected Drink">
  </div>

  <div class="container">
    <div id="task-display">
      <span class="step-counter" id="step-info"></span>
      <h2 id="current-task-text"></h2>
      <div id="image-container"></div>
    </div>
    <div class="controls">
      <button class="done-btn stage-start" id="btn-start" onclick="nextStage()">Start Task</button>
      
      <div id="btn-row" style="display:none; flex-direction:row; gap:10px; width:100%;">
        <button class="done-btn stage-continue" id="btn-continue" onclick="nextStage()" style="flex:1">Continue</button>
        <button class="done-btn stage-end" id="btn-end" onclick="nextStage()" style="flex:1; display:none;">End Task</button>
      </div>
      
      <button class="back-btn" id="back-btn" onclick="prevStage()">Go Back</button>
    </div>
  </div>

  <div id="side-panel">
    <div id='drinkButtons'>
      <button class='ice' onclick="openToolWithDrink('ice')">Ice</button>
      <button class='snapple' onclick="openToolWithDrink('snapple')">Snapple</button>
      <button class='snapple_juice' onclick="openToolWithDrink('snapple_juice')">Snapple Juice</button>
      <button class='bloom' onclick="openToolWithDrink('bloom')">Bloom</button>
      <button class='fiji' onclick="openToolWithDrink('fiji')">Fiji</button>
      <button class='core' onclick="openToolWithDrink('core')">Core</button>
      <button class='essentia' onclick="openToolWithDrink('essentia')">Essentia</button>
      <button class='eternal' onclick="openToolWithDrink('eternal')">Eternal</button>
      <button class='evian' onclick="openToolWithDrink('evian')">Evian</button>
      <button class='gatorade' onclick="openToolWithDrink('gatorade')">Gatorade</button>
      <button class='java_brew' onclick="openToolWithDrink('java_brew')">Java Brew</button>
      <button class='nesquik' onclick="openToolWithDrink('nesquik')">Nesquik</button>
      <button class='nirvana' onclick="openToolWithDrink('nirvana')">Nirvana</button>
      <button class='saratoga' onclick="openToolWithDrink('saratoga')">Saratoga</button>
      <button class='ryl' onclick="openToolWithDrink('ryl')">Ryl</button>
    </div>

    <div id="drinkTool">
      <div class="tool-header">
          <h3 id="active-drink-name" style="text-align:center; color:var(--accent); margin-top:0;">SELECT DRINK</h3>
      </div>
      <div class="calc-display">
          <div id="result-label" style="color:#888; font-size:0.8rem; text-transform: uppercase;">Shelf Count</div>
          <div class="big-number" id="input-display">0</div>
      </div>
      <div class="numpad">
          <button class="num-btn" onclick="pressNum(1)">1</button>
          <button class="num-btn" onclick="pressNum(2)">2</button>
          <button class="num-btn" onclick="pressNum(3)">3</button>
          <button class="num-btn" onclick="pressNum(4)">4</button>
          <button class="num-btn" onclick="pressNum(5)">5</button>
          <button class="num-btn" onclick="pressNum(6)">6</button>
          <button class="num-btn" onclick="pressNum(7)">7</button>
          <button class="num-btn" onclick="pressNum(8)">8</button>
          <button class="num-btn" onclick="pressNum(9)">9</button>
          <button class="num-btn clear-btn" onclick="pressNum('clear')">C</button>
          <button class="num-btn" onclick="pressNum(0)">0</button>
          <button class="num-btn enter-btn" onclick="calculateResult()">ENTER</button>
          <button class="num-btn" style="grid-column: span 3; font-size: 0.9rem; background: #333;" onclick="closeTool()">BACK TO LIST</button>
      </div>
    </div>
  </div>
</div>

<script>
const tasks = [
  { text: "Check for the empty drink rows" },
  { text: "Go to the back and load the drink boxes on the cart" },
  { text: "Bring drink boxes to the cooler" },
  { text: "Cut open plastic wrap" },
  { text: "Put drinks into cooler (Logo Out)" },
  { text: "Take plastic wrap off the boxes" },
  { text: "Break down boxes" }
];

const rowSizes = {
  ice: 8, snapple: 8, snapple_juice: 7, bloom: 8, fiji: 8, core: 7, 
  essentia: 8, eternal: 8, evian: 8, gatorade: 7, java_brew: 9, 
  nesquik: 6, nirvana: 7, saratoga: 8, ryl: 8
};

let currentIndex = 0;
let sessionStarted = false; // Controls if we are in the instruction flow
let activeDrink = '';
let currentInputStr = "";
let isShowingResult = false;

const drinkButtonsGrid = document.getElementById('drinkButtons');
const drinkTool = document.getElementById("drinkTool");
const largeDrinkView = document.getElementById("large-drink-view");
const leftDisplay = document.getElementById("left-display");

function updateUI() {
  const currentTask = tasks[currentIndex];
  
  // 1. Logic for showing/hiding Start vs. Continue buttons
  if (!sessionStarted) {
    document.getElementById("current-task-text").innerText = "";
    document.getElementById("btn-start").style.display = "block";
    document.getElementById("btn-row").style.display = "none";
  } else {
    document.getElementById("current-task-text").innerText = currentTask.text;
    document.getElementById("step-info").innerText = `Step ${currentIndex + 1} of ${tasks.length}`;
    document.getElementById("btn-start").style.display = "none";
    document.getElementById("btn-row").style.display = "flex";
  }

  // 2. Logic for End Task vs Continue
  const isLastTask = currentIndex === tasks.length - 1;
  document.getElementById("btn-continue").style.display = isLastTask ? "none" : "block";
  document.getElementById("btn-end").style.display = isLastTask ? "block" : "none";

  // 3. Clear assets and reset drink UI states
  const existingAssets = leftDisplay.querySelectorAll('.task-image');
  existingAssets.forEach(el => el.remove());

  // Default: Hide all drink-related UI components
  drinkButtonsGrid.style.display = 'none';
  drinkButtonsGrid.style.visibility = 'hidden';
  drinkTool.style.display = "none";
  largeDrinkView.style.display = "none";

  if (sessionStarted) {
    if (currentIndex === 0) {
      const img = document.createElement('img');
      img.src = "emptyCooler.jpg";
      img.className = "task-image";
      leftDisplay.appendChild(img);
    } 
    else if (currentIndex === 1) {
      const img2 = document.createElement('img');
      img2.src = 'drinkStorageImg.jpg';
      img2.className = "task-image";
      leftDisplay.appendChild(img2);
    } 
    else if (currentIndex === 3) {
      const gif1 = document.createElement('img');
      gif1.src = "holdingCutter.gif";
      gif1.className = "task-image";
      const gif2 = document.createElement('img');
      gif2.src = "holdingCutter.gif";
      gif2.className = "task-image";
      leftDisplay.appendChild(gif1);
      leftDisplay.appendChild(gif2);
    } 
    // ONLY show drink grid on Task 5 (Index 4)
    else if (currentIndex === 4) {
      drinkButtonsGrid.style.display = 'grid';
      drinkButtonsGrid.style.visibility = 'visible';
    } 
    else if (currentIndex === 5) {
      const gif = document.createElement('img');
      gif.src = "takingOffPlastic.gif";
      gif.className = "task-image";
      leftDisplay.appendChild(gif);
    } 
    // Last Task (Step 7 / Index 6): Break down boxes
    else if (currentIndex === 6) {
      const gif = document.createElement('img');
      gif.src = "breakingBoxes.gif";
      gif.className = "task-image";
      leftDisplay.appendChild(gif);      
    }
  }
 
  // 4. Back button logic
  document.getElementById("back-btn").style.visibility = (!sessionStarted || currentIndex === 0) ? 'hidden' : 'visible';
}

function nextStage() {
  if (!sessionStarted) {
    flashBtn("btn-start", () => { 
      sessionStarted = true; 
      updateUI(); 
    });
  } else {
    const isLastTask = currentIndex === tasks.length - 1;
    const btnId = isLastTask ? "btn-end" : "btn-continue";
    
    flashBtn(btnId, () => {
      if (currentIndex < tasks.length - 1) {
        currentIndex++;
        updateUI();
      } else {
        // Final Completion Screen
        document.getElementById("task-display").innerHTML = `<span class="step-counter">Finished</span><h2>Restock Complete!</h2>`;
        document.getElementById("btn-start").style.display = "block";
        document.getElementById("btn-start").innerText = "Start New Session";
        document.getElementById("btn-start").onclick = () => location.reload();
        document.getElementById("btn-row").style.display = "none";
        document.getElementById("back-btn").style.display = "none";
        drinkButtonsGrid.style.display = "none";
        largeDrinkView.style.display = "none";
      }
    });
  }
}

function openToolWithDrink(type) {
  activeDrink = type;
  currentInputStr = "";
  isShowingResult = false;
  document.getElementById("active-drink-name").innerText = type.replace('_', ' ').toUpperCase();
  document.getElementById("result-label").innerText = "Shelf Count";
  document.getElementById("input-display").innerText = "0";
  document.getElementById("input-display").style.color = "var(--accent)";
  
  const drinkBtn = document.querySelector(`.${type}`);
  const bgImg = window.getComputedStyle(drinkBtn).backgroundImage;
  const url = bgImg.replace('url("', '').replace('")', '').replace('url(', '').replace(')', '');
  
  largeDrinkView.src = url;
  largeDrinkView.style.display = "block";
  drinkButtonsGrid.style.display = "none";
  drinkTool.style.display = "block";
}

function pressNum(val) {
    if (isShowingResult) {
        currentInputStr = "";
        isShowingResult = false;
        document.getElementById("result-label").innerText = "Shelf Count";
        document.getElementById("input-display").style.color = "var(--accent)";
    }
    if (val === 'clear') {
        currentInputStr = "";
    } else {
        currentInputStr += val;
    }
    document.getElementById("input-display").innerText = currentInputStr === "" ? "0" : currentInputStr;
}

function calculateResult() {
    const currentCount = parseInt(currentInputStr || "0");
    const needed = rowSizes[activeDrink];
    const toAdd = Math.max(needed - currentCount, 0);
    isShowingResult = true;
    document.getElementById("result-label").innerText = "Add to Cooler:";
    document.getElementById("input-display").innerText = toAdd;
    document.getElementById("input-display").style.color = "#ffd600"; 
}

function closeTool() {
    drinkTool.style.display = "none";
    drinkButtonsGrid.style.display = "grid";
    drinkButtonsGrid.style.visibility = "visible";
    largeDrinkView.style.display = "none";
    currentInputStr = "";
}

function flashBtn(id, callback) {
  const btn = document.getElementById(id);
  btn.style.transform = "scale(0.9)";
  setTimeout(() => {
    btn.style.transform = "scale(1)";
    if (callback) callback();
  }, 180);
}

function prevStage() {
  if (currentIndex > 0) { 
    currentIndex--; 
    updateUI(); 
  }
}

updateUI();
</script>

</body>
</html>
