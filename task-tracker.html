<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restock Focus Mode</title>

<style>
:root {
  --bg: #121212;
  --card: #1e1e1e;
  --accent: #00e676;
  --text: #ffffff;
  --secondary: #888;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  transition: background 0.6s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden; 
}

.main-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1600px;
  min-height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  gap: 40px;
}

.left-spacer {
  flex: 1;
  max-width: 440px;
  height: 600px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  gap: 20px;
}

#large-drink-view {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8));
  display: none;
}

.container {
  background: var(--card);
  padding: 2.5rem;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,.6);
  width: 100%;
  max-width: 420px;
  text-align: center;
  z-index: 10;
  flex-shrink: 0;
}

#side-panel {
  flex: 1;
  max-width: 440px;
  min-height: 550px;
  display: flex;
  flex-direction: column;
}

#task-display {
  min-height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.step-counter {
  color: var(--accent);
  font-size: .85rem;
  letter-spacing: 1.5px;
  margin-bottom: 0.5rem;
}

.task-image {
    max-width: 100%;
    border-radius: 12px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

.controls {
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

button {
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, filter 0.2s;
}

button:active { transform: scale(0.95); }

.done-btn {
  background: var(--accent);
  font-size: 20px;
  color: #000;
}

.done-btn.stage-start { background: #00e676; }
.done-btn.stage-continue { background: #ffd600; }
.done-btn.stage-end { background: #ff5252; color: #fff; }

.back-btn {
  background: #2a2a2a;
  color: var(--text);
  visibility: hidden;
  font-size: 20px;
}

#drinkButtons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 15px;
  visibility: hidden; 
}

#drinkButtons button {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 18px;
  background-color: grey; 
  color: yellow;            
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 12px;
  padding-left: 6px;
  padding-right: 6px;
  box-sizing: border-box;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  font-size: 13px;
  font-weight: 900;          
  text-transform: uppercase;
  text-align: center;
  border: 2px solid rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}

#drinkButtons button span {
  z-index: 2;
  position: relative;
}

#drinkTool {
  display: none;
  padding: 25px;
  background: var(--card);
  border-radius: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  border: 1px solid #333;
}

.calc-display {
    background: #121212;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid #333;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.big-number {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
}

.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.num-btn {
    background: #2a2a2a;
    color: white;
    padding: 15px;
    font-size: 1.4rem;
    border-radius: 15px;
}

.enter-btn { background: var(--accent); color: #000; }
.clear-btn { background: #442222; }

@media (max-width: 1100px) {
  .main-wrapper {
    flex-direction: column;
    height: auto;
    padding: 40px 20px;
  }
  .left-spacer {
    height: auto;
    min-height: 300px;
    order: -1;
  }
  #side-panel {
    width: 100%;
    max-width: 420px;
    min-height: auto;
  }
  body { overflow-y: auto; }
}

.settings {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
}

.settings-btn {
  background: #333;
  color: white;
  border: 1px solid #555;
}

#drink-list {
  width: 90%;
  max-width: 1500px;
  margin: 40px auto;
  background: var(--card);
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,.6);
  box-sizing: border-box;
}

.drink-list-title {
  margin-top: 0;
  margin-bottom: 20px;
  text-align: center;
  color: var(--accent);
}


.drink-list-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  justify-content: center;
}

.drink-btn {
  width: 100%;
  height: 80px;
  overflow: hidden;
  padding: 0;
  background-color: #2a2a2a;
  color: white;
  border-radius: 12px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

.delete-btn {
  display: none;
  font-size: 1.2rem;
  font-weight: 900;
}

.drink-btn:hover {
  background-color: #ff5252;
  color: white;
} 

.drink-btn:hover .drink-name {
  display: none;
}

.drink-btn:hover .delete-btn {
  display: inline;
}


.add-drink-section {
  background: #121212;
  border: 1px solid #333;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 30px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
  justify-content: center;
}

.add-drink-section h3 {
  margin: 0;
  width: 100%;
  text-align: center;
  color: var(--text);
  font-size: 1.1rem;
}

.add-drink-section input {
  background: #2a2a2a;
  border: 1px solid #444;
  color: #fff;
  padding: 12px;
  border-radius: 8px;
  font-family: inherit;
  min-width: 180px;
  font-size: 0.95rem;
}

.add-drink-section input[type="file"] {
  background: transparent;
  border: none;
  padding: 5px;
  cursor: pointer;
  min-width: 140px;
}

.add-drink-section input:focus {
  outline: 1px solid var(--accent);
}

.add-btn {
  background: var(--accent);
  color: #000;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 700;
}
</style>
</head>

<body>
  
<div class='settings'>
  <button class='settings-btn' onclick='settingDrinks()'>Settings / Back</button>  
</div>

<div id='drink-list' style='display:none'>

    <h3>Add New Drink</h3>

    <button class="drink-btn" id="set-btn-snapple_juice" onclick="deleteDrink('snapple_juice')"><span class="drink-name">Snapple Juice</span><span class="delete-btn">Delete X</span></button>
    <button class="drink-btn" id="set-btn-bloom" onclick="deleteDrink('bloom')"><span class="drink-name">Bloom</span><span class="delete-btn">Delete X</span></button>
    <button class="drink-btn" id="set-btn-fiji" onclick="deleteDrink('fiji')"><span class="drink-name">Fiji</span><span class="delete-btn">Delete X</span></button>
    <button class="drink-btn" id="set-btn-core" onclick="deleteDrink('core')"><span class="drink-name">Core</span><span class="delete-btn">Delete X</span></button>

</div>

  <div class="left-spacer" id="left-display">

  </div>

  <div class="container">

    </div>

<script>
const tasks = [
  { text: "Check for the empty drink rows" },
  { text: "Go to the back and load the drink boxes on the cart" },
  { text: "Bring drink boxes to the cooler" },
  { text: "Cut open plastic wrap" },
  { text: "Put drinks into cooler (Logo Out)" },
  { text: "Take plastic wrap off the boxes" },
  { text: "Break down boxes" }
];

// Fallback baseline layout definitions
const defaultRowSizes = {
  ice: 8, snapple: 8, snapple_juice: 7, bloom: 8, fiji: 8, core: 7, 
  essentia: 8, eternal: 8, evian: 8, gatorade: 7, java_brew: 9, 
  nesquik: 6, nirvana: 7, saratoga: 8, ryl: 8
};

// Global state mirrors synced with LocalStorage profiles
let rowSizes = {};
let customDrinksData = [];
let deletedDrinksList = [];

let currentIndex = 0;
let sessionStarted = false; 
let activeDrink = '';
let currentInputStr = "";
let isShowingResult = false;

const drinkButtonsGrid = document.getElementById('drinkButtons');
const drinkTool = document.getElementById("drinkTool");
const largeDrinkView = document.getElementById("large-drink-view");
const leftDisplay = document.getElementById("left-display");

// Initializes dataset mappings directly out of browser memory pipelines
function initStorage() {
  const savedRowSizes = localStorage.getItem('restock_rowSizes');
  const savedCustomDrinks = localStorage.getItem('restock_customDrinks');
  const savedDeletedDrinks = localStorage.getItem('restock_deletedDrinks');

  if (savedDeletedDrinks) {
    deletedDrinksList = JSON.parse(savedDeletedDrinks);
  }
  
  if (savedRowSizes) {
    rowSizes = JSON.parse(savedRowSizes);
  } else {
    rowSizes = { ...defaultRowSizes };
  }

  // Wipe out elements marked as deleted on startup
  deletedDrinksList.forEach(type => {
    const mainGridButton = document.getElementById(`main-btn-${type}`);
    if (mainGridButton) mainGridButton.remove();

    const settingButton = document.getElementById(`set-btn-${type}`);
    if (settingButton) settingButton.remove();
    
    if (rowSizes[type]) delete rowSizes[type];
  });

  // Rebuild user custom appended inventory sets
  if (savedCustomDrinks) {
    customDrinksData = JSON.parse(savedCustomDrinks);
    customDrinksData.forEach(drink => {
      buildDrinkDOM(drink.key, drink.name, drink.capacity, drink.imageSrc, false);
    });
  }
}

function saveStorageToBrowser() {
  localStorage.setItem('restock_rowSizes', JSON.stringify(rowSizes));
  localStorage.setItem('restock_customDrinks', JSON.stringify(customDrinksData));
  localStorage.setItem('restock_deletedDrinks', JSON.stringify(deletedDrinksList));
}

function settingDrinks(){
  const list = document.getElementById('drink-list');
  const mainWrapper = document.getElementById('main-content');
  
  if(mainWrapper.style.display === 'none') {
    mainWrapper.style.display = 'flex';
    list.style.display = 'none';
    updateUI(); 
  } else {
    mainWrapper.style.display = 'none';
    list.style.display = 'flex';
    list.style.flexDirection = 'column';
    list.style.justifyContent = 'center';
  }
}

function deleteDrink(type) {
  const mainGridButton = document.getElementById(`main-btn-${type}`);
  if (mainGridButton) mainGridButton.remove();

  const settingButton = document.getElementById(`set-btn-${type}`);
  if (settingButton) settingButton.remove();

  if (rowSizes[type]) delete rowSizes[type];

  // Remove tracking profile if it was a user dynamic upload element
  customDrinksData = customDrinksData.filter(item => item.key !== type);
  
  // Mark identifier down on the persistence structural registry blacklist
  if (!deletedDrinksList.includes(type)) {
    deletedDrinksList.push(type);
  }

  saveStorageToBrowser();
}

// Separate creation engine execution blocks from handling upload triggers
function buildDrinkDOM(drinkKey, originalName, capacity, imageSrc, triggerSave = true) {
  rowSizes[drinkKey] = capacity;

  const mainBtn = document.createElement('button');
  mainBtn.className = drinkKey;
  mainBtn.id = `main-btn-${drinkKey}`;
  
  const textSpan = document.createElement('span');
  textSpan.innerText = originalName;
  mainBtn.appendChild(textSpan);
  
  if (imageSrc) {
    mainBtn.style.backgroundImage = `linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 60%), url('${imageSrc}')`;
    mainBtn.style.backgroundSize = 'cover';
    mainBtn.style.backgroundPosition = 'center';
    mainBtn.style.backgroundRepeat = 'no-repeat';
    mainBtn.style.color = 'yellow'; 
  }
  
  mainBtn.onclick = function() { openToolWithDrink(drinkKey); };
  drinkButtonsGrid.appendChild(mainBtn);

  const setGrid = document.getElementById('settings-grid-container');
  const setBtn = document.createElement('button');
  setBtn.className = 'drink-btn';
  setBtn.id = `set-btn-${drinkKey}`;
  setBtn.onclick = function() { deleteDrink(drinkKey); };
  setBtn.innerHTML = `<span class="drink-name">${originalName}</span><span class="delete-btn">Delete X</span>`;
  setGrid.appendChild(setBtn);

  if (triggerSave) {
    customDrinksData.push({
      key: drinkKey,
      name: originalName,
      capacity: capacity,
      imageSrc: imageSrc
    });
    saveStorageToBrowser();
  }
}

function addNewDrink() {
  const nameInput = document.getElementById('new-drink-name');
  const capInput = document.getElementById('new-drink-capacity');
  const imageInput = document.getElementById('new-drink-image');
  
  const originalName = nameInput.value.trim();
  const capacity = parseInt(capInput.value);

  if (!originalName || isNaN(capacity) || capacity < 1) {
    alert("Please enter a valid drink name and maximum capacity number.");
    return;
  }

  const drinkKey = originalName.toLowerCase().replace(/[^a-z0-9]/g, '_');

  if (rowSizes[drinkKey]) {
    alert("This drink item identifier already exists.");
    return;
  }

  const handleCreation = (imageSrc) => {
    buildDrinkDOM(drinkKey, originalName, capacity, imageSrc, true);
    
    nameInput.value = "";
    capInput.value = "";
    imageInput.value = "";
  };

  if (imageInput.files && imageInput.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      handleCreation(e.target.result);
    };
    reader.readAsDataURL(imageInput.files[0]);
  } else {
    handleCreation(null);
  }
}

function updateUI() {
  const currentTask = tasks[currentIndex];
  
  if (!sessionStarted) {
    document.getElementById("current-task-text").innerText = "";
    document.getElementById("btn-start").style.display = "block";
    document.getElementById("btn-row").style.display = "none";
  } else {
    document.getElementById("current-task-text").innerText = currentTask.text;
    document.getElementById("step-info").innerText = `Step ${currentIndex + 1} of ${tasks.length}`;
    document.getElementById("btn-start").style.display = "none";
    document.getElementById("btn-row").style.display = "flex";
  }

  const isLastTask = currentIndex === tasks.length - 1;
  document.getElementById("btn-continue").style.display = isLastTask ? "none" : "block";
  document.getElementById("btn-end").style.display = isLastTask ? "block" : "none";

  const existingAssets = leftDisplay.querySelectorAll('.task-image');
  existingAssets.forEach(el => el.remove());

  drinkButtonsGrid.style.display = 'none';
  drinkButtonsGrid.style.visibility = 'hidden';
  drinkTool.style.display = "none";
  largeDrinkView.style.display = "none";

  if (sessionStarted) {
    if (currentIndex === 0) {
      const img = document.createElement('img');
      img.src = "https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_5989%20(1).jpg";
      img.className = "task-image";
      leftDisplay.appendChild(img);
    } 
    else if (currentIndex === 1) {
      const img2 = document.createElement('img');
      img2.src = 'https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_5979%20(1).jpg';
      img2.className = "task-image";
      leftDisplay.appendChild(img2);
    } 
    else if (currentIndex === 3) {
      const gif1 = document.createElement('img');
      gif1.src = "https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_0009%20(1).gif";
      gif1.className = "task-image";
      const gif2 = document.createElement('img');
      gif2.src = "https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_0008%20(1).gif";
      gif2.className = "task-image";
      leftDisplay.appendChild(gif1);
      leftDisplay.appendChild(gif2);
    } 
    else if (currentIndex === 4) {
      drinkButtonsGrid.style.display = 'grid';
      drinkButtonsGrid.style.visibility = 'visible';
    } 
    else if (currentIndex === 5) {
      const gif = document.createElement('img');
      gif.src = "https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_5984-ezgif.com-video-to-gif-converter%20(1).gif";
      gif.className = "task-image";
      leftDisplay.appendChild(gif);
    } 
    else if (currentIndex === 6) {
      const gif = document.createElement('img');
      gif.src = "https://uploads.onecompiler.io/44h79x2wv/44h79hq67/IMG_5985%20(1).gif";
      gif.className = "task-image";
      leftDisplay.appendChild(gif);      
    }
  }
 
  document.getElementById("back-btn").style.visibility = (!sessionStarted || currentIndex === 0) ? 'hidden' : 'visible';
}

function nextStage() {
  if (!sessionStarted) {
    flashBtn("btn-start", () => { 
      sessionStarted = true; 
      updateUI(); 
    });
  } else {
    const isLastTask = currentIndex === tasks.length - 1;
    const btnId = isLastTask ? "btn-end" : "btn-continue";
    
    flashBtn(btnId, () => {
      if (currentIndex < tasks.length - 1) {
        currentIndex++;
        updateUI();
      } else {
        document.getElementById("task-display").innerHTML = `<span class="step-counter">Finished</span><h2>Restock Complete!</h2>`;
        document.getElementById("btn-start").style.display = "block";
        document.getElementById("btn-start").innerText = "Start New Session";
        document.getElementById("btn-start").onclick = () => location.reload();
        document.getElementById("btn-row").style.display = "none";
        document.getElementById("back-btn").style.display = "none";
        drinkButtonsGrid.style.display = "none";
        largeDrinkView.style.display = "none";
      }
    });
  }
}

function openToolWithDrink(type) {
  activeDrink = type;
  currentInputStr = "";
  isShowingResult = false;
  document.getElementById("active-drink-name").innerText = type.replace(/_/g, ' ').toUpperCase();
  document.getElementById("result-label").innerText = "Shelf Count";
  document.getElementById("input-display").innerText = "0";
  document.getElementById("input-display").style.color = "var(--accent)";
  
  const drinkBtn = document.getElementById(`main-btn-${type}`) || document.querySelector(`.${type}`);
  if (drinkBtn) {
    const bgImg = window.getComputedStyle(drinkBtn).backgroundImage;
    if (bgImg && bgImg !== 'none') {
      let url = bgImg.split(',').pop(); 
      url = url.replace('url("', '').replace('")', '').replace('url(', '').replace(')', '').trim();
      largeDrinkView.src = url;
      largeDrinkView.style.display = "block";
    } else {
      largeDrinkView.style.display = "none";
    }
  }
  
  drinkButtonsGrid.style.display = "none";
  drinkTool.style.display = "block";
}

function pressNum(val) {
    if (isShowingResult) {
        currentInputStr = "";
        isShowingResult = false;
        document.getElementById("result-label").innerText = "Shelf Count";
        document.getElementById("input-display").style.color = "var(--accent)";
    }
    if (val === 'clear') {
        currentInputStr = "";
    } else {
        currentInputStr += val;
    }
    document.getElementById("input-display").innerText = currentInputStr === "" ? "0" : currentInputStr;
}

function calculateResult() {
    const currentCount = parseInt(currentInputStr || "0");
    const needed = rowSizes[activeDrink] || 0; 
    const toAdd = Math.max(needed - currentCount, 0);
    isShowingResult = true;
    document.getElementById("result-label").innerText = "Add to Cooler:";
    document.getElementById("input-display").innerText = toAdd;
    document.getElementById("input-display").style.color = "#ffd600"; 
}

function closeTool() {
    drinkTool.style.display = "none";
    drinkButtonsGrid.style.display = "grid";
    drinkButtonsGrid.style.visibility = "visible";
    largeDrinkView.style.display = "none";
    currentInputStr = "";
}

function flashBtn(id, callback) {
  const btn = document.getElementById(id);
  btn.style.transform = "scale(0.9)";
  setTimeout(() => {
    btn.style.transform = "scale(1)";
    if (callback) callback();
  }, 180);
}

function prevStage() {
  if (currentIndex > 0) { 
    currentIndex--; 
    updateUI(); 
  }
}

// Boot storage synchronization engine up prior to drawing screen elements
initStorage();
updateUI();
</script>
